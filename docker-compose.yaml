version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timesheet-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - TZ=${TZ:-Asia/Ho_Chi_Minh}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timesheet-frontend
    ports:
      - "5173:80" # Maps localhost:5173 to Nginx port 80 inside the container
    env_file:
      - ./frontend/.env
    environment:
      - VITE_TZ=${VITE_TZ:-Asia/Ho_Chi_Minh}
    depends_on:
      - backend
    restart: unless-stopped
